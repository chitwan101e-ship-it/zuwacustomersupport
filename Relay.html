function Avatar({ name, size = 36, online = false }) {
  const { t } = useTheme();
  const initials = (name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  const hues = [260, 195, 330, 155, 28, 285, 12, 180, 310, 220];
  const hue = hues[(name || 'A').charCodeAt(0) % hues.length];
  return (
    <div style={{ position: 'relative', flexShrink: 0 }}>
      <div style={{
        width: size, height: size, borderRadius: size / 2,
        background: `oklch(0.52 0.19 ${hue})`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: size * 0.35, fontWeight: 700, color: '#fff', letterSpacing: '-0.3px',
        userSelect: 'none',
      }}>{initials}</div>
      {online && (
        <div style={{
          position: 'absolute', bottom: 1, right: 1,
          width: size * 0.27, height: size * 0.27, borderRadius: '50%',
          background: t.success, border: `2px solid ${t.card}`,
        }} />
      )}
    </div>
  );
}

function Badge({ count, color, dot = false }) {
  const { t } = useTheme();
  if (!count && !dot) return null;
  if (dot) return (
    <div style={{ width: 8, height: 8, borderRadius: 4, background: color || t.accent }} />
  );
  return (
    <div style={{
      background: color || t.accent, color: '#fff',
      fontSize: 10, fontWeight: 700, minWidth: 18, height: 18,
      borderRadius: 9, display: 'flex', alignItems: 'center',
      justifyContent: 'center', padding: '0 5px', flexShrink: 0,
    }}>{count > 99 ? '99+' : count}</div>
  );
}

function Btn({ children, variant = 'primary', size = 'md', onClick, disabled, full = false, style: sx = {} }) {
  const { t } = useTheme();
  const [hov, setHov] = useState(false);
  const [pressed, setPressed] = useState(false);
  const vs = {
    primary: { background: hov ? t.gradientBtnHover : t.gradientBtn, color: '#fff', border: 'none' },
    secondary: { background: hov ? t.elevated : t.inputBg, color: t.text, border: `1px solid ${t.border}` },
    ghost: { background: hov ? t.inputBg : 'transparent', color: t.muted, border: 'none' },
    danger: { background: hov ? '#c83030' : t.danger, color: '#fff', border: 'none' },
    success: { background: hov ? '#2da860' : t.success, color: '#fff', border: 'none' },
    outline: { background: 'transparent', color: t.accent, border: `1.5px solid ${t.accent}` },
  };
  const ss = { sm: { p: '6px 12px', fs: 13 }, md: { p: '10px 18px', fs: 14 }, lg: { p: '14px 24px', fs: 15 } };
  const v = vs[variant] || vs.primary;
  const s = ss[size] || ss.md;
  return (
    <button
      onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => { setHov(false); setPressed(false); }}
      onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)}
      style={{
        ...v, borderRadius: 12, padding: s.p, fontSize: s.fs, fontWeight: 600,
        cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.45 : 1,
        transition: 'all 0.15s ease', fontFamily: 'inherit',
        width: full ? '100%' : undefined,
        transform: pressed ? 'scale(0.97)' : 'scale(1)',
        boxShadow: variant === 'primary' && !disabled ? `0 4px 16px ${t.accentGlow}` : 'none',
        ...sx,
      }}
    >{children}</button>
  );
}

function TextInput({ placeholder, value, onChange, type = 'text', multiline = false, label, rows = 3 }) {
  const { t } = useTheme();
  const [focused, setFocused] = useState(false);
  const base = {
    width: '100%', background: t.inputBg, color: t.text, fontFamily: 'inherit',
    border: `1.5px solid ${focused ? t.accent : t.border}`,
    borderRadius: 12, padding: '11px 14px', fontSize: 15, outline: 'none',
    transition: 'border-color 0.15s', resize: 'none', boxSizing: 'border-box',
    '::placeholder': { color: t.muted },
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
      {label && <label style={{ fontSize: 12, fontWeight: 600, color: t.muted, textTransform: 'uppercase', letterSpacing: '0.5px' }}>{label}</label>}
      {multiline
        ? <textarea rows={rows} placeholder={placeholder} value={value} onChange={e => onChange(e.target.value)} onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} style={base} />
        : <input placeholder={placeholder} value={value} onChange={e => onChange(e.target.value)} type={type} onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} style={base} />
      }
    </div>
  );
}

function StatusDot({ status }) {

  const colors = { approved: t.success, pending: t.warn, rejected: t.danger, blocked: t.muted, 'new': t.info, 'in-review': t.warn, resolved: t.success };

  const color = colors[status] || t.muted;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      background: color + '18', color, fontSize: 11, fontWeight: 700,
      padding: '3px 8px', borderRadius: 20, letterSpacing: '0.3px',
    }}>
      <span style={{ width: 5, height: 5, borderRadius: '50%', background: color, display: 'inline-block' }} />
      {labels[status] || status}
    </span>
  );
}

function Divider({ label }) {
  const { t } = useTheme();
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '4px 0' }}>
      <div style={{ flex: 1, height: 1, background: t.border }} />
      {label && <span style={{ fontSize: 11, color: t.muted, fontWeight: 500 }}>{label}</span>}
      {label && <div style={{ flex: 1, height: 1, background: t.border }} />}
    </div>
  );
}

function Card({ children, style: sx = {}, onClick }) {
  const { t } = useTheme();
  const [hov, setHov] = useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => onClick && setHov(true)}
      onMouseLeave={() => onClick && setHov(false)}
      style={{
        background: hov ? t.elevated : t.card,
        border: `1px solid ${t.border}`,
        borderRadius: 20, padding: 18,
        transition: 'all 0.15s ease',
        cursor: onClick ? 'pointer' : 'default',
        boxShadow: t.cardShadow,
        ...sx,
      }}
    >{children}</div>
  );
}

function CustomerChat() {
  const { t, theme } = useTheme();

  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const scrollRef = useRef(null);
  const accentGrad = theme === 'playful'
    ? 'linear-gradient(135deg, #e040a0, #7c5af6)'
    : 'linear-gradient(135deg, #7c5af6, #5a7ff6)';

    if (!input.trim()) return;
    const msg = { id: 'm' + Date.now(), sender: 'customer', body: input.trim(), time: 'Just now', status: 'sent' };

    setInput('');
    setTimeout(() => setTyping(true), 600);
    setTimeout(() => {
      setTyping(false);
      setMessages(ms => [...ms, {
        id: 'm' + Date.now(), sender: 'staff', body: "Thanks for your message! We'll get back to you as soon as possible.", time: 'Just now', status: 'delivered', staffName: 'Relay Support',
      }]);
    }, 2200);
  };

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, typing]);

  return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column' }}>

          width: 38, height: 38, borderRadius: 12, background: accentGrad,

          <div style={{ fontSize: 12, color: t.success }}>● Online</div>
        </div>
        <button style={{ marginLeft: 'auto', background: 'none', border: 'none', cursor: 'pointer', padding: 6 }}>
          <Icon name="more" size={20} color={t.muted} />
        </button>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', padding: '16px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {/* Date divider */}
        <div style={{ textAlign: 'center', marginBottom: 4 }}>
          <span style={{ fontSize: 11, color: t.muted, background: t.elevated, padding: '3px 10px', borderRadius: 20 }}>Today</span>
        </div>

        {messages.map((msg, i) => {
          const isSelf = msg.sender === 'customer';
          const showAvatar = !isSelf && (i === 0 || messages[i-1]?.sender !== 'staff');
          return (
            <div key={msg.id} style={{ display: 'flex', flexDirection: isSelf ? 'row-reverse' : 'row', gap: 8, alignItems: 'flex-end' }}>
              {!isSelf && <div style={{ width: 28, flexShrink: 0 }}>
                {showAvatar && <div style={{ width: 28, height: 28, borderRadius: 9, background: accentGrad, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon name="relay" size={14} color="#fff" />
                </div>}
              </div>}
              <div style={{ maxWidth: '72%', display: 'flex', flexDirection: 'column', gap: 3 }}>
                {!isSelf && showAvatar && <div style={{ fontSize: 11, color: t.muted, marginLeft: 4, fontWeight: 600 }}>{msg.staffName}</div>}
                <div style={{
                  background: isSelf ? accentGrad : t.otherBubble,
                  color: isSelf ? '#fff' : t.otherBubbleText,
                  padding: '10px 14px', borderRadius: isSelf ? '18px 18px 4px 18px' : '18px 18px 18px 4px',

                <div style={{ display: 'flex', alignItems: 'center', gap: 4, justifyContent: isSelf ? 'flex-end' : 'flex-start', padding: '0 4px' }}>
                  <span style={{ fontSize: 10, color: t.muted }}>{msg.time}</span>

                    <Icon name={msg.status === 'seen' ? 'checkcheck' : 'check'} size={11} color={msg.status === 'seen' ? t.info : t.muted} />
                  </span>}
                </div>
              </div>
            </div>
          );
        })}

        {typing && (
          <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end' }}>
            <div style={{ width: 28, height: 28, borderRadius: 9, background: accentGrad, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon name="relay" size={14} color="#fff" />

            <div style={{ background: t.otherBubble, padding: '12px 16px', borderRadius: '18px 18px 18px 4px', display: 'flex', gap: 4, alignItems: 'center' }}>

          boxShadow: input.trim() ? `0 4px 14px ${t.accentGlow}` : 'none',
        }}>
          <Icon name="send" size={18} color={input.trim() ? '#fff' : t.muted} />
        </button>
      </div>
    </div>
  );

// ─── ADMIN USERS ──────────────────────────────────────────────────────────────

function AdminUsers() {
  const { t } = useTheme();
  const { nav } = useApp();
  const [filter, setFilter] = useState('pending');
  const [users, setUsers] = useState(MOCK_CUSTOMERS);
  const [search, setSearch] = useState('');

  const filtered = users.filter(u => {
    const matchFilter = filter === 'all' || u.status === filter;
    const matchSearch = !search || u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  const approve = (id) => setUsers(us => us.map(u => u.id === id ? { ...u, status: 'approved' } : u));
  const reject = (id) => setUsers(us => us.map(u => u.id === id ? { ...u, status: 'rejected' } : u));
  const block = (id) => setUsers(us => us.map(u => u.id === id ? { ...u, status: 'blocked' } : u));

  const filters = ['pending', 'approved', 'rejected', 'all'];
  const counts = { pending: users.filter(u => u.status === 'pending').length, approved: users.filter(u => u.status === 'approved').length, rejected: users.filter(u => u.status === 'rejected').length, all: users.length };

  return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div style={{ padding: '14px 20px 0' }}>

            fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box',
          }} />

        {/* Filter tabs */}
        <div style={{ display: 'flex', gap: 6, paddingBottom: 12, overflowX: 'auto' }}>
          {filters.map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{
              padding: '6px 12px', borderRadius: 20, border: `1.5px solid ${filter === f ? t.accent : t.border}`,
              background: filter === f ? t.accent + '18' : 'transparent',
              color: filter === f ? t.accent : t.muted,
              fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
              textTransform: 'capitalize', whiteSpace: 'nowrap',
              display: 'flex', alignItems: 'center', gap: 5,
            }}>
              {f} {counts[f] > 0 && <span style={{ background: filter === f ? t.accent : t.muted, color: '#fff', fontSize: 9, fontWeight: 800, width: 15, height: 15, borderRadius: 8, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>{counts[f]}</span>}
            </button>
          ))}
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px 24px', display: 'flex', flexDirection: 'column', gap: 10 }}>

          <div style={{ textAlign: 'center', padding: 40, color: t.muted, fontSize: 14 }}>No users found</div>
        )}
        {filtered.map(u => (
          <div key={u.id} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 18, padding: '14px 16px', boxShadow: t.cardShadow }}>

function AdminInbox() {
  const { t, theme } = useTheme();

  const [messagesMap, setMessagesMap] = useState(MOCK_MESSAGES_STORE);

  const approved = MOCK_CUSTOMERS.filter(c => c.status === 'approved');
  const accentGrad = theme === 'playful'
    ? 'linear-gradient(135deg, #e040a0, #7c5af6)'
    : 'linear-gradient(135deg, #7c5af6, #5a7ff6)';

  const send = () => {
    if (!input.trim()) return;
    const msg = { id: 'm' + Date.now(), sender: 'staff', body: input.trim(), time: 'Just now', status: 'delivered', staffName: 'Support' };
    setMessagesMap(mm => ({ ...mm, [selected]: [...(mm[selected] || []), msg] }));

  };

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messagesMap, selected]);

  const selectedUser = approved.find(c => c.id === selected);
  const msgs = messagesMap[selected] || [];

  // Mobile: show list or chat
  if (view === 'list') return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div style={{ padding: '14px 20px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: t.text, letterSpacing: '-0.4px' }}>Inbox</div>
        <Badge count={approved.reduce((s, c) => s + (c.unread || 0), 0)} />
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px 24px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        {approved.map(c => (
          <div key={c.id} onClick={() => { setSelected(c.id); setView('chat'); }} style={{
            background: t.card, border: `1px solid ${c.unread ? t.accent + '30' : t.border}`,
            borderRadius: 18, padding: '13px 15px', cursor: 'pointer', display: 'flex', gap: 12, alignItems: 'center',
            boxShadow: c.unread ? `0 2px 12px ${t.accentGlow}` : t.cardShadow,
          }}>
            <Avatar name={c.name} size={46} online={c.lastActive === '5m ago'} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 14, fontWeight: 700, color: t.text }}>{c.name}</span>
                <span style={{ fontSize: 11, color: t.muted }}>{c.lastActive}</span>
              </div>
              <div style={{ fontSize: 13, color: t.muted, marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.lastMsg || 'No messages yet'}</div>
            </div>
            {c.unread > 0 && <Badge count={c.unread} />}
          </div>
        ))}
      </div>
      <AdminBottomNav active="inbox" />
    </div>
  );

  return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      {/* Chat header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px 12px', borderBottom: `1px solid ${t.border}`, background: t.card }}>
        <button onClick={() => setView('list')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
          <Icon name="back" size={22} color={t.muted} />
        </button>
        {selectedUser && <><Avatar name={selectedUser.name} size={36} online={selectedUser.lastActive === '5m ago'} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: t.text }}>{selectedUser.name}</div>
          <div style={{ fontSize: 11, color: t.muted }}>{selectedUser.email} · {selectedUser.lastActive}</div>
        </div></>}
        <div style={{ display: 'flex', gap: 4 }}>
          <button onClick={() => nav('admin-notify')} style={{ background: t.inputBg, border: 'none', borderRadius: 10, width: 34, height: 34, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="megaphone" size={16} color={t.muted} />
          </button>
        </div>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', padding: '14px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        <div style={{ textAlign: 'center', marginBottom: 4 }}>
          <span style={{ fontSize: 11, color: t.muted, background: t.elevated, padding: '3px 10px', borderRadius: 20 }}>Conversation with {selectedUser?.name}</span>
        </div>
        {msgs.map((msg, i) => {
          const isStaff = msg.sender === 'staff';
          return (
            <div key={msg.id} style={{ display: 'flex', flexDirection: isStaff ? 'row-reverse' : 'row', gap: 8, alignItems: 'flex-end' }}>
              {!isStaff && <Avatar name={selectedUser?.name || '?'} size={28} />}
              <div style={{ maxWidth: '72%' }}>
                {isStaff && i > 0 && msgs[i-1]?.sender !== 'staff' && <div style={{ fontSize: 11, color: t.muted, textAlign: 'right', marginBottom: 3, fontWeight: 600 }}>{msg.staffName || 'Staff'}</div>}
                <div style={{
                  background: isStaff ? accentGrad : t.otherBubble,
                  color: isStaff ? '#fff' : t.otherBubbleText,
                  padding: '10px 14px', fontSize: 14, lineHeight: 1.5,
                  borderRadius: isStaff ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
                  boxShadow: isStaff ? `0 3px 12px ${t.accentGlow}` : 'none',
                }}>{msg.body}</div>
                <div style={{ fontSize: 10, color: t.muted, marginTop: 3, textAlign: isStaff ? 'right' : 'left', padding: '0 4px' }}>{msg.time}</div>
              </div>
            </div>
          );
        })}
        {msgs.length === 0 && (
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, paddingTop: 60 }}>
            <Icon name="chat" size={36} color={t.faint} />
            <div style={{ fontSize: 14, color: t.muted }}>No messages yet — say hello!</div>
          </div>
        )}
      </div>

      {/* Internal note toggle + input */}
      <div style={{ padding: '10px 14px 20px', background: t.nav, backdropFilter: 'blur(20px)', borderTop: `1px solid ${t.border}` }}>
        <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
          <div style={{ flex: 1, background: t.inputBg, borderRadius: 24, border: `1.5px solid ${t.border}` }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()}
              placeholder={`Reply to ${selectedUser?.name || 'user'}…`}
              style={{ width: '100%', padding: '11px 16px', background: 'none', border: 'none', color: t.text, fontSize: 14, fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box' }} />
          </div>
          <button onClick={send} style={{
            width: 44, height: 44, borderRadius: 22, border: 'none', cursor: 'pointer',
            background: input.trim() ? accentGrad : t.inputBg,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'all 0.2s', boxShadow: input.trim() ? `0 4px 14px ${t.accentGlow}` : 'none',
          }}>
            <Icon name="send" size={18} color={input.trim() ? '#fff' : t.muted} />
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── NOTIFICATION COMPOSER ────────────────────────────────────────────────────

function AdminNotify() {
  const { t } = useTheme();
  const [title, setTitle] = useState('');
  const [body, setBody] = useState('');
  const [type, setType] = useState('announcement');
  const [audience, setAudience] = useState('all');
  const [preview, setPreview] = useState(false);
  const [sent, setSent] = useState(false);

  const types = [{ id: 'announcement', label: 'Announcement', icon: 'megaphone' }, { id: 'alert', label: 'Alert', icon: 'alert' }, { id: 'update', label: 'Update', icon: 'bell' }];
  const audiences = [{ id: 'all', label: 'All Members' }, { id: 'selected', label: 'Selected Users' }, { id: 'single', label: 'One User' }];

  if (sent) return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32, textAlign: 'center' }}>
      <StatusBar />
      <div style={{ width: 64, height: 64, borderRadius: 32, background: t.success + '20', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 16 }}>
        <Icon name="check" size={30} color={t.success} />
      </div>
      <div style={{ fontSize: 22, fontWeight: 800, color: t.text, marginBottom: 8 }}>Notification Sent!</div>
      <div style={{ fontSize: 14, color: t.muted, lineHeight: 1.6, marginBottom: 28 }}>Your message was delivered to {audience === 'all' ? 'all 3 members' : 'selected recipients'}.</div>
      <Btn full onClick={() => { setSent(false); setTitle(''); setBody(''); setPreview(false); }}>Send Another</Btn>
    </div>
  );

  if (preview) return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div style={{ padding: '14px 20px 0', display: 'flex', alignItems: 'center', gap: 10 }}>
        <button onClick={() => setPreview(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
          <Icon name="back" size={22} color={t.muted} />
        </button>
        <div style={{ fontSize: 18, fontWeight: 800, color: t.text }}>Preview</div>
      </div>
      <div style={{ flex: 1, padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ fontSize: 12, color: t.muted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>How recipients will see it:</div>
        <div style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 18, padding: '16px', overflow: 'hidden', position: 'relative' }}>
          <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 4, background: type === 'alert' ? t.warn : type === 'announcement' ? t.success : t.accent }} />
          <div style={{ paddingLeft: 8 }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 }}>
              <div style={{ width: 32, height: 32, borderRadius: 10, background: (type === 'alert' ? t.warn : type === 'announcement' ? t.success : t.accent) + '18', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name={type === 'alert' ? 'alert' : 'megaphone'} size={15} color={type === 'alert' ? t.warn : type === 'announcement' ? t.success : t.accent} />
              </div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: t.text }}>{title || 'Notification title'}</div>
                <div style={{ fontSize: 11, color: t.muted }}>Just now</div>
              </div>
            </div>
            <div style={{ fontSize: 13, color: t.muted, lineHeight: 1.6 }}>{body || 'Your notification message will appear here.'}</div>
          </div>
        </div>
        <div style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 16, padding: '14px 16px' }}>
          {[['Type', types.find(tp => tp.id === type)?.label], ['Audience', audiences.find(a => a.id === audience)?.label], ['Recipients', audience === 'all' ? '3 members' : audience === 'single' ? '1 user' : 'Selected']].map(([k, v]) => (
            <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', borderBottom: `1px solid ${t.border}` }}>
              <span style={{ fontSize: 13, color: t.muted }}>{k}</span>
              <span style={{ fontSize: 13, fontWeight: 600, color: t.text }}>{v}</span>
            </div>
          ))}
        </div>
        <Btn full size="lg" onClick={() => setSent(true)}>Send Notification</Btn>
      </div>
      <AdminBottomNav active="notify" />
    </div>
  );

  return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div style={{ padding: '14px 20px 0' }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: t.text, letterSpacing: '-0.4px', marginBottom: 2 }}>Send Notification</div>
        <div style={{ fontSize: 13, color: t.muted, marginBottom: 16 }}>Compose a message for your members</div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px 24px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {/* Type */}
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.muted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>Type</div>
          <div style={{ display: 'flex', gap: 8 }}>
            {types.map(tp => (
              <button key={tp.id} onClick={() => setType(tp.id)} style={{
                flex: 1, padding: '10px 6px', borderRadius: 14, border: `2px solid ${type === tp.id ? t.accent : t.border}`,
                background: type === tp.id ? t.accent + '15' : t.card,
                cursor: 'pointer', fontFamily: 'inherit',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, transition: 'all 0.15s',
              }}>
                <Icon name={tp.icon} size={18} color={type === tp.id ? t.accent : t.muted} />
                <span style={{ fontSize: 11, fontWeight: 600, color: type === tp.id ? t.accent : t.muted }}>{tp.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Audience */}
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.muted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>Audience</div>
          <div style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 16, overflow: 'hidden' }}>
            {audiences.map((a, i) => (
              <button key={a.id} onClick={() => setAudience(a.id)} style={{
                width: '100%', padding: '12px 16px', background: 'none', border: 'none',
                borderBottom: i < audiences.length - 1 ? `1px solid ${t.border}` : 'none',
                cursor: 'pointer', fontFamily: 'inherit',
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              }}>
                <span style={{ fontSize: 14, color: t.text }}>{a.label}</span>
                <div style={{ width: 20, height: 20, borderRadius: 10, border: `2px solid ${audience === a.id ? t.accent : t.border}`, background: audience === a.id ? t.accent : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {audience === a.id && <div style={{ width: 8, height: 8, borderRadius: 4, background: '#fff' }} />}
                </div>
              </button>
            ))}
          </div>
        </div>

        <TextInput label="Title" placeholder="e.g. Platform Update" value={title} onChange={setTitle} />
        <TextInput label="Message" placeholder="Write your notification message…" value={body} onChange={setBody} multiline rows={4} />

        <Btn full size="lg" onClick={() => setPreview(true)} disabled={!title.trim() || !body.trim()}>
          Preview & Send
        </Btn>
      </div>
      <AdminBottomNav active="notify" />
    </div>
  );
}

// ─── ADMIN REPORTS ─────────────────────────────────────────────────────────────

function AdminReports() {
  const { t } = useTheme();
  const { nav } = useApp();
  const [reports, setReports] = useState(MOCK_REPORTS);
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(null);

  const filtered = filter === 'all' ? reports : reports.filter(r => r.status === filter);
  const updateStatus = (id, status) => setReports(rs => rs.map(r => r.id === id ? { ...r, status } : r));

  if (selected) {
    const r = reports.find(rp => rp.id === selected);
    const statusColor = { 'new': t.info, 'in-review': t.warn, 'resolved': t.success }[r.status] || t.muted;
    return (
      <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column' }}>
        <StatusBar />
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px 10px' }}>
          <button onClick={() => setSelected(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
            <Icon name="back" size={22} color={t.muted} />
          </button>
          <div style={{ fontSize: 18, fontWeight: 800, color: t.text }}>Report Detail</div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px 24px', display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 18, padding: 18 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
              <Avatar name={r.userName} size={44} />
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: t.text }}>{r.userName}</div>
                <div style={{ fontSize: 12, color: t.muted }}>{r.time}</div>
              </div>
              <div style={{ marginLeft: 'auto' }}><StatusDot status={r.status} /></div>
            </div>
            <div style={{ background: t.elevated, borderRadius: 12, padding: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: t.muted, marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.5px' }}>{r.type}</div>
              <div style={{ fontSize: 14, color: t.text, lineHeight: 1.6 }}>{r.desc}</div>
            </div>
          </div>
          {/* Status actions */}
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: t.muted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>Update Status</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {['new', 'in-review', 'resolved'].map(s => (
                <button key={s} onClick={() => updateStatus(r.id, s)} style={{
                  flex: 1, padding: '9px 0', borderRadius: 12,
                  border: `2px solid ${r.status === s ? statusColor : t.border}`,
                  background: r.status === s ? statusColor + '15' : t.card,
                  color: r.status === s ? statusColor : t.muted,
                  fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
                  textTransform: 'capitalize', transition: 'all 0.15s',
                }}>{s.replace('-', ' ')}</button>
              ))}
            </div>
          </div>
          <Btn full variant="secondary" onClick={() => nav('admin-inbox')}>Reply via Chat</Btn>
          {r.status !== 'resolved' && <Btn full variant="success" onClick={() => { updateStatus(r.id, 'resolved'); setSelected(null); }}>Mark Resolved</Btn>}
        </div>
        <AdminBottomNav active="reports" />
      </div>
    );
  }

  return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div style={{ padding: '14px 20px 0' }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: t.text, letterSpacing: '-0.4px', marginBottom: 14 }}>Reports</div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
          {['all', 'new', 'in-review', 'resolved'].map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{
              padding: '5px 11px', borderRadius: 20,
              border: `1.5px solid ${filter === f ? t.accent : t.border}`,
              background: filter === f ? t.accent + '18' : 'transparent',
              color: filter === f ? t.accent : t.muted,
              fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
              textTransform: 'capitalize', whiteSpace: 'nowrap',
            }}>{f.replace('-', ' ')}</button>
          ))}
        </div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px 24px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filtered.map(r => {
          const col = { 'new': t.info, 'in-review': t.warn, 'resolved': t.success }[r.status] || t.muted;
          return (
            <div key={r.id} onClick={() => setSelected(r.id)} style={{
              background: t.card, border: `1px solid ${r.status === 'new' ? t.info + '30' : t.border}`,
              borderRadius: 18, padding: '14px 16px', cursor: 'pointer',
              boxShadow: r.status === 'new' ? `0 2px 12px ${t.info}15` : t.cardShadow,
              position: 'relative', overflow: 'hidden',
            }}>
              <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 4, background: col, borderRadius: '4px 0 0 4px' }} />
              <div style={{ paddingLeft: 8 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                  <Avatar name={r.userName} size={32} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>{r.userName}</span>
                      <StatusDot status={r.status} />
                    </div>
                    <div style={{ fontSize: 11, color: t.muted }}>{r.time}</div>
                  </div>
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: col, marginBottom: 3 }}>{r.type}</div>
                <div style={{ fontSize: 13, color: t.muted, lineHeight: 1.5, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{r.desc}</div>
              </div>
            </div>
          );
        })}
      </div>
      <AdminBottomNav active="reports" />
    </div>
  );
}

// ─── ADMIN BOTTOM NAV ─────────────────────────────────────────────────────────

function AdminBottomNav({ active }) {
  const { t, theme } = useTheme();
  const { nav } = useApp();
  const tabs = [
    { id: 'dashboard', icon: 'grid', label: 'Home', route: 'admin-dashboard' },
    { id: 'inbox', icon: 'inbox', label: 'Inbox', route: 'admin-inbox', badge: 3 },
    { id: 'users', icon: 'users', label: 'Users', route: 'admin-users', badge: 2 },
    { id: 'notify', icon: 'megaphone', label: 'Notify', route: 'admin-notify' },
    { id: 'reports', icon: 'flag', label: 'Reports', route: 'admin-reports', badge: 1 },
  ];
  const accentGrad = theme === 'playful'
    ? 'linear-gradient(135deg, #e040a0, #7c5af6)'
    : 'linear-gradient(135deg, #7c5af6, #5a7ff6)';
  return (
    <div style={{
      background: t.nav, backdropFilter: 'blur(20px)',
      borderTop: `1px solid ${t.border}`,
      display: 'flex', padding: '8px 0 16px', flexShrink: 0,
    }}>
      {tabs.map(tab => {
        const isActive = active === tab.id;
        return (
          <button key={tab.id} onClick={() => nav(tab.route)} style={{
            flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
            gap: 3, background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0',
          }}>
            <div style={{ position: 'relative' }}>
              {isActive ? (
                <div style={{ width: 34, height: 34, borderRadius: 11, background: accentGrad, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 3px 10px ${t.accentGlow}` }}>
                  <Icon name={tab.icon} size={17} color="#fff" />
                </div>
              ) : (
                <div style={{ width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon name={tab.icon} size={20} color={t.muted} />
                </div>
              )}
              {!isActive && tab.badge > 0 && (
                <div style={{ position: 'absolute', top: 2, right: 2, width: 8, height: 8, borderRadius: 4, background: t.accent, border: `2px solid ${t.bg}` }} />
              )}
            </div>
            <span style={{ fontSize: 10, fontWeight: isActive ? 700 : 500, color: isActive ? t.accent : t.muted }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

Object.assign(window, {
  AdminLogin, AdminDashboard, AdminUsers, AdminInbox,
  AdminNotify, AdminReports, AdminBottomNav,
});

</script>

<script type="text/babel">

// relay-app.jsx — Root App, phone frame, and mount

const { useState, useEffect } = React;

// ─── TWEAK DEFAULTS ───────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

}/*EDITMODE-END*/;

// ─── PHONE FRAME ──────────────────────────────────────────────────────────────

function PhoneFrame({ children, theme }) {

  return (
    <div style={{
      width: 390, height: 844, borderRadius: 54,
      background: frameColor, padding: 11,
      boxShadow: `

    }}>
      {/* Physical buttons */}
      <div style={{ position: 'absolute', left: -3, top: 118, width: 3, height: 36, background: '#1e1e24', borderRadius: '2px 0 0 2px' }} />
      <div style={{ position: 'absolute', left: -3, top: 168, width: 3, height: 62, background: '#1e1e24', borderRadius: '2px 0 0 2px' }} />
      <div style={{ position: 'absolute', left: -3, top: 242, width: 3, height: 62, background: '#1e1e24', borderRadius: '2px 0 0 2px' }} />
      <div style={{ position: 'absolute', right: -3, top: 158, width: 3, height: 82, background: '#1e1e24', borderRadius: '0 2px 2px 0' }} />

      {/* Screen */}
      <div style={{ width: '100%', height: '100%', borderRadius: 44, overflow: 'hidden', position: 'relative', background: '#000' }}>
        {/* Notch */}
        <div style={{
          position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)',
          width: 118, height: 34, background: frameColor,
          borderRadius: '0 0 22px 22px', zIndex: 100,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          <div style={{ width: 11, height: 11, borderRadius: 6, background: '#111', border: '1px solid #2a2a35' }} />
          <div style={{ width: 7, height: 7, borderRadius: 4, background: '#111' }} />
        </div>
        {children}
      </div>

      {/* Home indicator */}
      <div style={{
        position: 'absolute', bottom: 18, left: '50%', transform: 'translateX(-50%)',
        width: 130, height: 5, background: 'rgba(255,255,255,0.22)', borderRadius: 3,
      }} />
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────

function App() {
  const [tweaks, setTweakState] = useState(TWEAK_DEFAULTS);
  const [open, setOpen] = useState(false);

  // Minimal tweak setter that also persists via postMessage
  const setTweak = (key, val) => {
    setTweakState(prev => {
      const next = { ...prev, [key]: val };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
      return next;
    });
  };

  const [theme, setThemeState] = useState(tweaks.theme);
  const [view, setView] = useState(tweaks.startView);
  const [modal, setModal] = useState(null);
  const [animKey, setAnimKey] = useState(0);

  const setTheme = (th) => { setThemeState(th); setTweak('theme', th); };
  const nav = (to) => { setView(to); setAnimKey(k => k + 1); setModal(null); };

  // Tweaks host protocol
  useEffect(() => {
    const onMsg = (e) => {
      const tp = e.data?.type;
      if (tp === '__activate_edit_mode') setOpen(true);
      else if (tp === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const t = themeTokens[theme] || themeTokens.dark;
  const appCtx = { view, nav, modal, setModal };
  const themeCtx = { theme, setTheme, t };
  const isAdmin = view.startsWith('admin');

  const screenMap = {
    landing: LandingScreen,
    pending: PendingScreen,
    'customer-home': CustomerHome,
    'customer-chat': CustomerChat,
    'customer-notifications': CustomerNotifications,
    'customer-profile': CustomerProfile,
    'admin-login': AdminLogin,
    'admin-dashboard': AdminDashboard,
    'admin-users': AdminUsers,
    'admin-inbox': AdminInbox,
    'admin-notify': AdminNotify,
    'admin-reports': AdminReports,
  };
  const Screen = screenMap[view] || LandingScreen;

  const stageBg = theme === 'playful'
    ? 'radial-gradient(ellipse at 35% 45%, #1e0a38 0%, #0d0a1a 65%)'
    : theme === 'light'
    ? 'radial-gradient(ellipse at 35% 45%, #c8c8dc 0%, #b0b0c8 65%)'
    : 'radial-gradient(ellipse at 35% 45%, #111328 0%, #08090d 65%)';

  const accentColor = theme === 'playful' ? '#e040a0' : '#7c5af6';

  const navItems = [
    { label: 'Landing', v: 'landing' },
    { label: 'Pending', v: 'pending' },
    { label: 'Home', v: 'customer-home' },
    { label: 'Chat', v: 'customer-chat' },
    { label: 'Notifs', v: 'customer-notifications' },
    { label: '·', v: null },
    { label: 'Admin Login', v: 'admin-login', admin: true },
    { label: 'Dashboard', v: 'admin-dashboard', admin: true },
    { label: 'Inbox', v: 'admin-inbox', admin: true },
    { label: 'Users', v: 'admin-users', admin: true },
    { label: 'Notify', v: 'admin-notify', admin: true },
    { label: 'Reports', v: 'admin-reports', admin: true },
  ];

  return (
    <ThemeProvider value={themeCtx}>
      <AppContext.Provider value={appCtx}>
        <div style={{
          width: '100vw', height: '100vh',
          background: stageBg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          position: 'relative', overflow: 'hidden',
        }}>
          {/* Ambient glows */}
          <div style={{ position: 'absolute', top: '15%', left: '18%', width: 450, height: 450, borderRadius: '50%', background: accentColor + '07', filter: 'blur(90px)', pointerEvents: 'none' }} />
          <div style={{ position: 'absolute', bottom: '12%', right: '14%', width: 320, height: 320, borderRadius: '50%', background: (theme === 'playful' ? '#5a7ff6' : '#5a7ff6') + '05', filter: 'blur(70px)', pointerEvents: 'none' }} />

          {/* View badge */}
          <div style={{
            position: 'absolute', top: 22, left: '50%', transform: 'translateX(-50%)',
            background: 'rgba(255,255,255,0.06)', backdropFilter: 'blur(12px)',
            border: '1px solid rgba(255,255,255,0.09)',
            borderRadius: 20, padding: '5px 14px',
            display: 'flex', alignItems: 'center', gap: 7,
          }}>
            <div style={{ width: 7, height: 7, borderRadius: 4, background: isAdmin ? t.danger : t.success }} />
            <span style={{ fontSize: 11, color: theme === 'light' ? '#555' : '#999', fontWeight: 600, letterSpacing: '0.3px' }}>
              {isAdmin ? 'Staff / Admin View' : 'Customer View'} — Relay
            </span>
          </div>

          {/* Bottom nav pills */}
          <div style={{
            position: 'absolute', bottom: 24, left: '50%', transform: 'translateX(-50%)',
            display: 'flex', gap: 5, flexWrap: 'wrap', justifyContent: 'center', maxWidth: 640,
          }}>
            {navItems.map((item, i) => {
              if (!item.v) return (
                <div key={i} style={{ width: 1, height: 22, background: 'rgba(255,255,255,0.12)', margin: '0 3px', alignSelf: 'center' }} />
              );
              const isActive = view === item.v;
              const activeColor = item.admin ? t.danger : accentColor;
              return (
                <button key={item.v} onClick={() => nav(item.v)} style={{
                  padding: '5px 12px', borderRadius: 20, border: 'none', cursor: 'pointer',
                  background: isActive ? activeColor + 'cc' : 'rgba(255,255,255,0.07)',
                  color: isActive ? '#fff' : theme === 'light' ? '#555' : '#aaa',
                  fontSize: 11, fontWeight: 600, fontFamily: 'DM Sans, sans-serif',
                  transition: 'all 0.15s', backdropFilter: 'blur(8px)',
                  boxShadow: isActive ? `0 3px 10px ${activeColor}40` : 'none',
                }}>{item.label}</button>
              );
            })}
          </div>

          {/* Phone */}
          <div key={animKey} style={{ animation: 'fadeIn 0.22s ease' }}>
            <PhoneFrame theme={theme}>
              <div style={{ width: '100%', height: '100%' }}>
                <Screen />
              </div>
              {modal === 'report' && <ReportModal />}
            </PhoneFrame>
          </div>

          {/* Tweaks panel */}
          {open && (
            <div style={{
              position: 'fixed', bottom: 80, right: 20, zIndex: 1000,
              background: theme === 'light' ? '#ffffff' : '#1a1d2a',
              border: `1px solid ${t.border}`,
              borderRadius: 20, padding: 20, width: 260,
              boxShadow: t.shadow, fontFamily: 'DM Sans, sans-serif',
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: t.text, marginBottom: 14 }}>Tweaks</div>

              {/* Theme */}
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: t.muted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>Theme</div>
                <div style={{ display: 'flex', gap: 6 }}>
                  {[{id:'dark',label:'Dark'},{id:'light',label:'Light'},{id:'playful',label:'Playful'}].map(th => (
                    <button key={th.id} onClick={() => setTheme(th.id)} style={{
                      flex: 1, padding: '7px 0', borderRadius: 10,
                      border: `2px solid ${theme === th.id ? t.accent : t.border}`,
                      background: theme === th.id ? t.accent + '18' : 'transparent',
                      color: theme === th.id ? t.accent : t.muted,
                      fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
                      transition: 'all 0.15s',
                    }}>{th.label}</button>
                  ))}
                </div>
              </div>

              {/* Jump to screen */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: t.muted, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>Jump to Screen</div>
                <select value={view} onChange={e => nav(e.target.value)} style={{
                  width: '100%', padding: '9px 12px', borderRadius: 10,
                  background: t.inputBg, border: `1px solid ${t.border}`,
                  color: t.text, fontSize: 13, fontFamily: 'inherit', outline: 'none', cursor: 'pointer',
                }}>
                  <optgroup label="Customer">
                    <option value="landing">Landing / Sign In</option>
                    <option value="pending">Pending Approval</option>
                    <option value="customer-home">Customer Home</option>
                    <option value="customer-chat">Customer Chat</option>
                    <option value="customer-notifications">Notifications</option>
                    <option value="customer-profile">Profile</option>
                  </optgroup>
                  <optgroup label="Admin / Staff">
                    <option value="admin-login">Admin Login</option>
                    <option value="admin-dashboard">Dashboard</option>
                    <option value="admin-inbox">Staff Inbox</option>
                    <option value="admin-users">User Approval</option>
                    <option value="admin-notify">Send Notification</option>
                    <option value="admin-reports">Reports</option>
                  </optgroup>
                </select>
              </div>

              {/* Close */}
              <button onClick={() => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} style={{
                position: 'absolute', top: 16, right: 16, background: t.inputBg,
                border: 'none', borderRadius: 8, width: 26, height: 26, cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: t.muted, fontSize: 16, fontFamily: 'inherit',
              }}>×</button>
            </div>
          )}
        </div>
      </AppContext.Provider>
    </ThemeProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

</script>

</body>
</html>
